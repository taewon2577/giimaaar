<!DOCTYPE html>
<html lang="ko">
<head>

    <!-- Tailwind CSS CDN -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { blue: "#1e3a8a", blueLight: "#3b82f6", yellow: "#eab308", navy: "#0f172a" },
                        slate: { 900: "#111827", 600: "#4b5563" }

                    fontFamily: { sans: ['Inter', 'Noto Sans KR', 'sans-serif'] },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-white text-slate-800 font-sans antialiased; margin: 0; }
        }
        @layer components {
            .glass-card { @apply bg-white border border-slate-100 rounded-[32px] shadow-sm transition-all overflow-hidden p-10 hover:shadow-2xl hover:-translate-y-2 duration-500; }
            .btn-primary { @apply px-10 py-4 bg-brand-blue text-white font-black rounded-full shadow-xl hover:bg-brand-navy transition-all flex items-center justify-center transform active:scale-95; }
            .nav-link { @apply text-[11px] font-black text-slate-400 hover:text-brand-blue transition-all relative uppercase tracking-[0.2em]; }
            .nav-active { @apply text-brand-blue; }
            .nav-active::after { content: ''; @apply absolute -bottom-1 left-0 w-full h-0.5 bg-brand-blue; }
            .tab-btn { @apply flex-1 py-5 text-center border font-black transition-all bg-slate-50 text-slate-300 border-slate-100 text-[11px] tracking-widest hover:bg-white hover:text-slate-600; }
            .tab-active { @apply bg-white text-brand-blue border-b-4 border-b-brand-blue shadow-sm; }
            .info-table { @apply w-full text-sm border-t-4 border-brand-navy; }

            .info-table td { @apply p-6 border-b border-slate-100 text-center font-medium text-slate-700; }
            .logo-box { @apply p-8 border border-slate-100 rounded-[24px] flex flex-col items-center justify-center bg-white shadow-sm hover:shadow-xl transition-all h-[130px] grayscale hover:grayscale-0 overflow-hidden; }
        }
    </style>
</head>
<body class="selection:bg-brand-blue selection:text-white">
    <div id="layout" class="flex flex-col min-h-screen">
        <!-- HEADER -->
        <header class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-xl border-b border-slate-100 shadow-sm">
            <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
                <a href="#/" class="flex items-center gap-4 group">
                    <div class="w-12 h-12 bg-brand-blue rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-2xl group-hover:rotate-[15deg] transition duration-500">Y</div>
                    <div class="flex flex-col">
                        <span class="text-xl font-black text-slate-900 leading-none tracking-tighter">동양미래대학교</span>
                        <span class="text-[10px] font-black text-brand-blue tracking-[0.3em] uppercase mt-1">Semiconductor Bootcamp</span>
                    </div>
                </a>
                <nav class="hidden lg:flex items-center space-x-12">
                    <a href="#/about" class="nav-link">사업단 소개</a>
                    <a href="#/courses" class="nav-link">교육과정</a>
                    <a href="#/facilities" class="nav-link">교육 인프라</a>
                    <a href="#/community" class="nav-link">커뮤니티</a>
                    <a href="#/careers" class="nav-link">취업지원</a>
                    <a href="#" class="btn-primary">수강신청</a>
                </nav>
            </div>
        </header>

        <main id="app" class="flex-grow pt-[88px]"></main>

        <footer class="bg-brand-navy text-slate-500 py-24 px-8 border-t border-slate-800">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between gap-16">
                <div class="space-y-8">
                    <h3 class="font-black text-white text-3xl italic tracking-tighter uppercase">Dongyang Mirae Semiconductor</h3>
                    <p class="text-sm font-medium leading-relaxed opacity-40 italic">08221 서울시 구로구 경인로 445 동양미래대학교 4호관 2층 203호<br/>TEL : 02-2610-1700 | FAX : 02-2688-5494</p>
                </div>
                <div class="flex flex-col items-center md:items-end justify-end space-y-6">
                    <div class="flex gap-8 opacity-40 font-black text-xs uppercase tracking-widest hover:text-white transition cursor-pointer">개인정보처리방침</div>
                    <p class="text-[10px] font-black tracking-[0.5em] opacity-20 uppercase italic">© 2026 Dongyang Mirae Univ. All Rights Reserved.</p>
                </div>
            </div>
        </footer>
    </div>

    <!-- APP ENGINE -->
    <script>
        const handleImgError = (el, name) => {
            el.style.display = 'none';
            const parent = el.parentElement;
            if (parent && parent.classList.contains('logo-box')) {
                const span = document.createElement('span');
                span.className = 'font-black text-brand-navy text-[11px] uppercase tracking-tighter text-center leading-tight';
                span.innerText = name || '협력사';
                parent.appendChild(span);
            } else {
                const div = document.createElement('div');
                div.className = 'w-full h-full bg-slate-50 flex items-center justify-center font-black text-slate-200 italic uppercase text-xs p-10 text-center';
                div.innerText = '이미지 준비 중';
                parent.appendChild(div);
            }
        };

        window.state = {
            aboutTab: 'intro', commTab: 'notice', courseTab: 'degree', facilityTab: 'env',
            posts: {
                notice: [
                    { id: 3, title: '[중요] 2026년도 하반기 반도체 부트캠프 수강생 모집 안내', date: '2026-06-18', views: 452, author: '사업단' },
                    { id: 2, title: '교육비 전액 국고지원 및 장학금 지급 기준 안내', date: '2026-06-10', views: 820, author: '관리자' },
                    { id: 1, title: '부트캠프 수료증 발급 시스템 이용 안내', date: '2026-05-20', views: 1240, author: '관리자' }
                ],
                data: [
                    { id: 3, title: '반도체 공정 기초 이론 요약집 (v2.0)', date: '2026-06-15', views: 120, author: '교수진' },
                    { id: 2, title: 'PLC 제어 실습 가이드북 PDF', date: '2026-06-05', views: 88, author: '기술팀' },
                    { id: 1, title: '취업역량 강화를 위한 자소서 양식 다운로드', date: '2026-05-12', views: 340, author: '지원팀' }
                ],
                gallery: [
                    { title: '반도체 클린룸 방진복 체험 실습', img: './assets/gallery1.png' },
                    { title: '제2회 기업 연계 프로젝트 수료식', img: './assets/gallery2.png' },
                    { title: 'STATS ChipPAC 기업 견학 현장', img: './assets/gallery3.png' }
                ],
                review: [
                    { id: 3, title: '비전공자에서 반도체 엔지니어로 취업하기까지', date: '2026-06-16', views: 980, author: '김*수' },
                    { id: 2, title: '부트캠프 실무 교육이 실제 현장에서 도움된 점', date: '2026-06-02', views: 420, author: '박*민' },
                    { id: 1, title: '램리서치코리아 최종 합격 후기 공유드립니다', date: '2026-05-15', views: 1560, author: '최*호' }
                ],
                faq: [
                    { id: 3, title: '교육 신청 자격 및 선발 기준은 무엇인가요?', date: '2026-06-18', views: 120, author: '사업단' },
                    { id: 2, title: '기존 전공과 상관없이 수강 가능한가요?', date: '2026-06-12', views: 450, author: '사업단' },
                    { id: 1, title: '교육 기간 중 아르바이트 병행이 가능한가요?', date: '2026-05-30', views: 320, author: '사업단' }
                ]
            }
        };

        const setTab = (k, v) => { window.state[k] = v; router(); };

        const renderBanner = (title, sub) => `
            <section class="relative h-[280px] bg-brand-blue overflow-hidden flex items-center justify-center text-center">
                <div class="absolute inset-0 bg-[radial-gradient(#ffffff1a_1.5px,transparent_1.5px)] [background-size:24px_24px] opacity-20"></div>
                <div class="relative z-10 px-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <h1 class="text-5xl md:text-6xl font-black text-white italic tracking-tighter mb-4 uppercase">${title}</h1>
                    <p class="text-blue-100 text-lg font-medium opacity-80 italic tracking-widest">${sub}</p>
                </div>
            </section>
        `;

        function renderAbout() {
            const tabs = [ { id: 'greeting', name: '인사말' }, { id: 'intro', name: '사업소개' }, { id: 'org', name: '조직도' }, { id: 'agencies', name: '협력기관' }, { id: 'depts', name: '참여학과' }, { id: 'map', name: '오시는 길' } ];
            const t = window.state.aboutTab;
            let content = '';

            if (t === 'intro') {
                content = `
                    <div class="max-w-6xl mx-auto py-24 space-y-32 animate-in fade-in">
                        <div>
                            <h3 class="text-4xl font-black mb-16 italic border-l-[16px] border-brand-blue pl-8">사업 개요</h3>
                            <table class="info-table">
                                <tr><th class="w-1/3">사업명</th><td class="text-left font-black text-lg">첨단산업인재양성 부트캠프사업 (반도체분야)</td></tr>
                                <tr><th>사업목적</th><td class="text-left py-10 font-bold leading-relaxed text-slate-500">기업 수요에 맞춘 단기 집중 커리큘럼을 통해 <br>현장 실무 역량을 갖춘 반도체 전문 인력 양성</td></tr>
                                <tr><th>사업기간</th><td class="text-left">2023. 03. 01 ~ 2028. 02. 29 (총 5년)</td></tr>
                                <tr><th>주관부처</th><td class="text-left font-bold text-brand-blue">교육부 | 한국산업기술진흥원 (KIAT)</td></tr>
                            </table>
                        </div>
                        <div class="text-center">
                             <h3 class="text-4xl font-black mb-20 italic text-left border-l-[16px] border-brand-blue pl-8">비전 및 목표</h3>
                             <div class="flex flex-col lg:flex-row items-center justify-center gap-6">
                                <div class="flex-1 min-h-[380px] bg-brand-blue text-white p-16 rounded-[60px] flex flex-col justify-center shadow-2xl relative overflow-hidden group">
                                    <span class="text-4xl font-black italic mb-6 block opacity-40 uppercase tracking-widest">비전</span>
                                    <p class="text-4xl font-black uppercase tracking-tighter italic italic">최고의 반도체<br>인재 양성 허브</p>
                                </div>
                                <div class="w-64 h-64 min-w-[256px] bg-white flex items-center justify-center z-10 -mx-10 sm:rounded-full border-[12px] border-brand-blue font-black text-brand-blue text-center text-3xl shadow-3xl">사업단</div>
                                <div class="flex-1 min-h-[380px] bg-brand-yellow text-slate-900 p-16 rounded-[60px] flex flex-col justify-center shadow-2xl relative overflow-hidden group">
                                    <span class="text-4xl font-black italic mb-6 block opacity-20 uppercase tracking-widest">목표</span>
                                    <p class="text-4xl font-black uppercase tracking-tighter italic italic">현장 결합형<br>실무 전문가 배출</p>
                                </div>
                             </div>
                        </div>
                    </div>`;
            } else if (t === 'agencies') {
                const list = [{n:'동양미래대학교',l:'https://www.dongyang.ac.kr/sites/dmu/images/common/logo.png'},{n:'교육부',l:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Ministry_of_Education_%28South_Korea%29_logo.svg/512px-Ministry_of_Education_%28South_Korea%29_logo.svg.png'},{n:'KIAT',l:'https://www.kiat.or.kr/content/images/common/logo.png'},{n:'반도체산업협회',l:''},{n:'ETRI',l:'https://www.etri.re.kr/assets/images/common/logo.png'}];
                content = `<div class="max-w-6xl mx-auto py-24 animate-in fade-in"><h3 class="text-3xl font-black mb-16 italic border-l-8 border-brand-blue pl-4">주요 협력 기관</h3><div class="grid grid-cols-2 md:grid-cols-5 gap-8">${list.map(a => `<div class="logo-box">${a.l ? `<img src="${a.l}" class="max-h-14 w-auto object-contain" onerror="handleImgError(this, '${a.n}')">` : `<span class="font-black text-brand-navy text-[11px] uppercase tracking-tighter">${a.n}</span>`}</div>`).join('')}</div></div>`;
            } else if (t === 'greeting') {
                content = `<div class="max-w-4xl mx-auto py-24 animate-in fade-in"><div class="glass-card shadow-2xl p-16"><div class="h-[600px] mb-12 rounded-[40px] overflow-hidden bg-slate-50 shadow-inner"><img src="./assets/greeting_hero.png" class="w-full h-full object-cover" onerror="handleImgError(this)"></div><h3 class="text-4xl font-black mb-10 italic tracking-tighter leading-tight">"반도체 강국의 꿈, 우리가 현장에서 실현합니다."</h3><p class="text-xl font-bold text-slate-400 leading-relaxed italic opacity-80 mb-16">최고의 교육 인프라를 통해 실무 역량을 갖춘 융합형 인재 양성에 기여하겠습니다.</p><div class="text-right border-t border-slate-100 pt-12"><span class="text-4xl font-black italic uppercase tracking-tighter">사업단장 오석중</span></div></div></div>`;
            } else if (t === 'org') {
                content = `<div class="max-w-6xl mx-auto py-24 animate-in slide-in-from-bottom-6 duration-700 flex flex-col items-center"><div class="w-[400px] p-12 bg-brand-blue text-white rounded-[40px] shadow-3xl font-black text-4xl text-center uppercase italic">사업단장</div><div class="w-2 h-16 bg-slate-100"></div><div class="grid grid-cols-1 md:grid-cols-3 gap-12 w-full mt-4">${['사업 운영 I (교과)','사업 운영 II (비교과)','사업 행정 및 회계'].map(s => `<div class="glass-card bg-slate-50/50 flex flex-col items-center"><h4 class="text-2xl font-black text-brand-blue mb-4 italic">${s}</h4><p class="text-sm font-bold text-slate-400 text-center leading-relaxed">교육과정 고도화 및 학생 선발, 인프라 구축 매뉴얼 수립</p></div>`).join('')}</div></div>`;
            } else if (t === 'depts') {
                const d = [{n:'로봇소프트웨어공학과',l:'https://www.dongyang.ac.kr/dmu/4495/subview.do',r:'4호관 206호'},{n:'자동화공학과',l:'https://www.dongyang.ac.kr/dmu/4480/subview.do',r:'4호관 208호'},{n:'반도체전자공학과',l:'https://www.dongyang.ac.kr/dmu/4523/subview.do',r:'3호관 409호'}];
                content = `<div class="max-w-7xl mx-auto py-24 grid grid-cols-1 md:grid-cols-3 gap-12">${d.map(obj => `<div class="glass-card text-center flex flex-col items-center group"><div class="w-20 h-20 bg-blue-50 text-brand-blue rounded-[32px] flex items-center justify-center mb-12 font-black text-4xl italic shadow-inner group-hover:bg-brand-blue group-hover:text-white transition duration-500 italic">#</div><h4 class="text-3xl font-black mb-4 italic tracking-tighter group-hover:text-brand-blue transition italic">${obj.n}</h4><p class="text-xs font-black text-slate-300 uppercase tracking-[0.4em] mb-12 italic">${obj.r}</p><div class="w-full"><a href="${obj.l}" target="_blank" class="btn-primary w-full py-6 text-xl uppercase italic font-black shadow-2xl">학과 홈페이지</a></div></div>`).join('')}</div>`;
            } else if (t === 'map') {
                content = `<div class="max-w-6xl mx-auto py-24 space-y-20 animate-in fade-in"><div class="glass-card p-0 h-[650px] border-slate-100 relative group"><div class="absolute inset-0 bg-slate-100 flex items-center justify-center font-black text-slate-100 text-[180px] opacity-10 uppercase tracking-widest italic select-none">CAMPUS</div></div><div class="glass-card bg-brand-navy p-20 flex flex-col lg:flex-row justify-between items-center shadow-3xl text-white border-none rounded-[60px]"><div class="space-y-6 text-center lg:text-left"><h4 class="text-5xl font-black italic tracking-tighter uppercase italic">오시는 길</h4><p class="text-2xl font-bold opacity-30">서울시 구로구 경인로 445 동양미래대학교 4호관 203호</p></div><div class="flex gap-6 mt-12 lg:mt-0"><button class="px-16 py-6 bg-[#03c75a] rounded-full font-black text-2xl active:scale-95 transition">네이버 지도</button><button class="px-16 py-6 bg-[#fae100] text-slate-900 rounded-full font-black text-2xl active:scale-95 transition">카카오 맵</button></div></div></div>`;
            }

            return `<div>${renderBanner('사업단 소개', '혁신 교육을 향한 국가적 사명')}<div class="max-w-7xl mx-auto px-6"><div class="flex bg-slate-50/50 backdrop-blur rounded-full overflow-hidden mt-12 mb-20 border border-slate-100 shadow-inner">${tabs.map(item => `<button onclick="setTab('aboutTab', '${item.id}')" class="tab-btn px-6 ${window.state.aboutTab === item.id ? 'tab-active' : ''}">${item.name}</button>`).join('')}</div><div id="about-content">${content}</div></div></div>`;
        }

        function renderCourses() {
            const tabs = [{ id: 'degree', name: '마이크로디그리 과정' }, { id: 'immersive', name: '몰입형 교육과정' }, { id: 'other', name: '기타 교육과정' }];
            const t = window.state.courseTab;
            let content = '';

            if (t === 'degree') {
                content = `
                    <div class="space-y-32 animate-in slide-in-from-bottom-5 duration-700">
                        <div class="bg-blue-100/10 p-24 rounded-[80px] border-2 border-dashed border-blue-200">
                            <h3 class="text-3xl font-black text-brand-blue mb-24 italic uppercase tracking-widest text-center italic">교육 체계도</h3>
                            <div class="flex flex-col lg:flex-row items-center justify-between gap-16 max-w-6xl mx-auto">
                                <div class="flex-1 space-y-8">${['정규 교과 구성','반도체 설비 특화','현장 맞춤형 이론'].map(v=>`<div class="p-12 bg-white border-2 border-brand-blue rounded-[40px] font-black text-brand-blue text-center shadow-2xl hover:scale-105 transition-transform italic text-xl">${v}</div>`).join('')}</div>
                                <div class="w-80 h-80 min-w-[320px] rounded-full bg-brand-navy flex flex-col items-center justify-center text-white italic font-black shadow-[0_0_80px_rgba(30,58,138,0.4)] relative z-10 p-16 text-center ring-[16px] ring-white">마이크로디그리<br><span class="text-xs opacity-50 block mt-4 font-sans tracking-[0.5em] uppercase">Core Course</span></div>
                                <div class="flex-1 space-y-8">${['단기 몰입형 교육','실전 기술 프로젝트','자격증 마스터 트랙'].map(v=>`<div class="p-12 bg-white border-2 border-brand-blue rounded-[40px] font-black text-brand-blue text-center shadow-2xl hover:scale-105 transition-transform italic text-xl">${v}</div>`).join('')}</div>
                            </div>
                        </div>
                        <div class="space-y-24">
                            ${['초급','중급','고급'].map(level => `
                                <div class="glass-card group p-20">
                                    <h4 class="text-5xl font-black mb-16 border-l-[32px] border-brand-blue pl-10 italic group-hover:translate-x-4 transition-transform italic italic">${level} 과정</h4>
                                    <table class="info-table w-full">
                                        <thead><tr><th>과정 구분</th><th>상세 교과목</th><th>권장 학년</th><th>시간 / 학점</th><th>이수 기준</th></tr></thead>
                                        <tbody>${level==='초급'? '<tr><td>정규 교과형</td><td>반도체 공정 및 설비기초 / 반도체 소자공정 기초</td><td>1, 2학년</td><td>45시간 / 3학점</td><td>C학점 이상</td></tr>':'<tr><td>융합 트랙</td><td>스마트 팩토리 연계 반도체 장비 제어 및 보전 실습</td><td>3, 4학년</td><td>60시간 / 4학점</td><td>최종 프로젝트 합격</td></tr>'}</tbody>
                                    </table>
                                </div>`).join('')}
                        </div>
                    </div>`;
            } else if (t === 'immersive') {
                content = `<div class="py-20 animate-in fade-in"><div class="glass-card p-20"><h4 class="text-5xl font-black mb-16 italic border-l-[24px] border-brand-blue pl-12 uppercase italic uppercase italic">계절제 몰입 교육 트랙</h4><table class="info-table w-full"><thead><tr><th>단계</th><th>교과목 명칭</th><th>협력 기업</th><th>학점/시간</th><th>연계 자격증</th></tr></thead><tbody><tr><td class="font-black text-blue-500">초급</td><td>반도체 장비 메인터넌스 기초</td><td>이엑스솔루션</td><td>2학점 / 30h</td><td>반도체설비보전기능사</td></tr><tr><td class="font-black text-brand-blue">고급</td><td>산업 로봇 기반 자동화 설비 제어</td><td>한국미쓰비시전기</td><td>3학점 / 45h</td><td>전기산업기사</td></tr></tbody></table></div></div>`;
            } else {
                content = `<div class="grid grid-cols-1 md:grid-cols-2 gap-20 py-24 animate-in slide-in-from-bottom-8 duration-700"><div class="glass-card p-20 bg-blue-50/20 border-blue-200"><h4 class="text-4xl font-black mb-12 italic uppercase">현장 실무 지원</h4><ul class="space-y-10 font-bold text-slate-500 text-2xl">${['반도체 현장 견학 지원','SEDEX 박람회 참관 지원','동/하계 장기 현장 실습'].map(v=>`<li>• ${v}</li>`).join('')}</ul></div><div class="glass-card p-20 bg-brand-yellow/5 border-yellow-100"><h4 class="text-4xl font-black mb-12 italic uppercase">취업 역량 강화</h4><ul class="space-y-10 font-bold text-slate-500 text-2xl">${['졸업생 실무 멘토링','1:1 면접 심화 클리닉','우수 협약기업 설명회'].map(v=>`<li>• ${v}</li>`).join('')}</ul></div></div>`;
            }
            return `<div>${renderBanner('교육과정', '현장 중심 실무형 테크니션 양성')}<div class="max-w-7xl mx-auto px-6 py-24"><div class="flex bg-slate-50 rounded-full overflow-hidden shadow-inner mb-24 border border-slate-100">${tabs.map(t => `<button onclick="setTab('courseTab', '${t.id}')" class="tab-btn px-8 ${window.state.courseTab === t.id ? 'tab-active' : ''}">${t.name}</button>`).join('')}</div><div id="course-content">${content}</div></div></div>`;
        }

        function renderFacility() {
            const tabs = [{id:'env', name:'시설 현황'}, {id:'labs', name:'주요 실습실'}];
            let content = `<div class="grid grid-cols-1 md:grid-cols-2 gap-12 py-20">${[{t:'반도체 클린룸', r:'3호관 109호 실습실', i:'./assets/cleanroom.png'}, {t:'스마트 제조 제어 센터', r:'4호관 102호 실습실', i:'./assets/robot_center.png'}].map(f => `<div class="glass-card text-center p-0"><div class="h-96 overflow-hidden bg-slate-50 flex items-center justify-center"><img src="${f.i}" class="w-full h-full object-cover" onerror="handleImgError(this)"></div><div class="p-12"><h4 class="text-3xl font-black mb-4 italic italic">${f.t}</h4><p class="text-xs font-black text-slate-300 uppercase italic tracking-widest italic">${f.r}</p></div></div>`).join('')}</div>`;
            return `<div>${renderBanner('교육 인프라', '최고의 설비와 최적의 환경')}<div class="max-w-7xl mx-auto px-6 py-20"><div class="flex border-b border-slate-100 mb-10">${tabs.map(t => `<button onclick="setTab('facilityTab', '${t.id}')" class="tab-btn ${window.state.facilityTab===t.id ? 'tab-active' : ''}">${t.name}</button>`).join('')}</div><div>${content}</div></div></div>`;
        }

        function renderCommunity() {
            const tabs = [{id:'notice', n:'공지사항'}, {id:'data', n:'자료실'}, {id:'gallery', n:'갤러리'}, {id:'review', n:'취업후기'}, {id:'faq', n:'현장 FAQ'}];
            let content = '';
            const t = window.state.commTab;

            if (t === 'gallery') {
                content = `<div class="grid grid-cols-1 md:grid-cols-3 gap-8 py-20 animate-in fade-in">${window.state.posts.gallery.map(g => `<div class="glass-card p-0 shadow-lg group"><div class="h-64 overflow-hidden bg-slate-50 flex items-center justify-center"><img src="${g.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700" onerror="handleImgError(this)"></div><div class="p-8"><h4 class="text-xl font-black italic tracking-tighter italic">${g.title}</h4></div></div>`).join('')}</div>`;
            } else {
                const list = window.state.posts[t] || [];
                content = `<div class="py-20 animate-in fade-in">
                    <table class="info-table border-t-4 border-brand-navy">
                        <thead><tr><th>번호</th><th>제목</th><th>작성자</th><th>조회수</th><th>등록일</th></tr></thead>
                        <tbody>${list.length > 0 ? list.map(p => `<tr><td>${p.id}</td><td class="text-left font-black text-slate-900 group cursor-pointer hover:text-brand-blue py-8 px-12 transition"> ${p.title} </td><td>${p.author||'관리자'}</td><td>${p.views}</td><td>${p.date}</td></tr>`).join('') : `<tr><td colspan="5" class="py-40 text-slate-200 font-black italic tracking-widest uppercase">작성된 게시글이 없습니다.</td></tr>`}</tbody>
                    </table>
                    <div class="mt-12 flex justify-end"><button class="btn-primary rounded-full px-16 shadow-2xl">글쓰기</button></div>
                </div>`;
            }
            return `<div>${renderBanner('커뮤니티', '소통하고 성장하는 공간')}<div class="max-w-7xl mx-auto px-6 py-20"><div class="flex bg-slate-50 border border-slate-100 rounded-full overflow-hidden mb-10">${tabs.map(tab => `<button onclick="setTab('commTab', '${tab.id}')" class="tab-btn px-6 ${window.state.commTab === tab.id ? 'tab-active' : ''}">${tab.n}</button>`).join('')}</div><div>${content}</div></div></div>`;
        }

        const router = () => {
            const h = window.location.hash.slice(1) || '/';
            const app = document.getElementById('app');
            const pageMap = {
                '/': () => `<div class="animate-in fade-in h-[85vh] flex flex-col justify-center items-center text-center px-6"><h2 class="text-9xl font-black italic tracking-tighter mb-8 leading-none">THE <span class="text-brand-blue">SILICON</span> FRONTIER</h2><p class="text-slate-400 font-black tracking-[0.6em] uppercase text-xl mb-20 italic opacity-60">Dongyang Mirae Semiconductor Innovation</p><div class="flex flex-col md:flex-row gap-8"><a href="#/courses" class="btn-primary px-20 py-7 text-2xl">교육과정 확인</a><a href="#/about" class="px-20 py-7 border-2 border-slate-200 rounded-full font-black text-slate-400 hover:bg-slate-50 transition">사업단 비전</a></div></div>`,
                '/about': renderAbout,
                '/courses': renderCourses,
                '/facilities': renderFacility,
                '/community': renderCommunity,
                '/careers': () => `<div>${renderBanner('취업지원', '미래를 향한 확실한 경로')}</div>`
            };
            
            const renderFn = pageMap[h.split('?')[0]] || pageMap['/'];
            app.innerHTML = renderFn();

            document.querySelectorAll('.nav-link').forEach(l => {
                const path = l.getAttribute('href').slice(1);
                l.classList.toggle('nav-active', h.startsWith(path) && path !== '');
                if (h === '/' && path === '') l.classList.add('nav-active');
            });
            window.scrollTo(0,0);
        };

        window.addEventListener('hashchange', router); window.addEventListener('load', router);
    </script>
</body>
</html>
