<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동양미래대학교 반도체부트캠프사업단</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { blue: "#1e3a8a", blueLight: "#3b82f6", yellow: "#eab308", navy: "#0f172a" },
                        slate: { 900: "#111827", 600: "#4b5563" }
                    },
                    fontFamily: { sans: ['Inter', 'Noto Sans KR', 'sans-serif'] },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @tailwind base;
        @tailwind components;
        @tailwind utilities;

        @layer base {
            /* 전체 글씨 크기를 키워 가독성 향상 (기본 16px -> 18px) */
            html { font-size: 112.5%; }
            body { @apply bg-white text-slate-800 font-sans antialiased; margin: 0; }
        }
        @layer components {
            .glass-card { @apply bg-white border border-slate-100 rounded-[32px] shadow-sm transition-all overflow-hidden p-8 hover:shadow-2xl hover:-translate-y-2 duration-500; }
            .btn-primary { @apply px-10 py-4 bg-brand-blue text-white font-black rounded-full shadow-xl hover:bg-brand-navy transition-all flex items-center justify-center transform active:scale-95 text-base; }
            .nav-link { @apply text-[14px] font-black text-slate-500 hover:text-brand-blue transition-all relative uppercase tracking-[0.15em]; }
            .nav-active { @apply text-brand-blue; }
            .nav-active::after { content: ''; @apply absolute -bottom-1 left-0 w-full h-0.5 bg-brand-blue; }
            .tab-btn { @apply flex-1 py-5 text-center border font-black transition-all bg-slate-50 text-slate-400 border-slate-100 text-[14px] tracking-wide hover:bg-white hover:text-slate-700; }
            .tab-active { @apply bg-white text-brand-blue border-b-4 border-b-brand-blue shadow-sm font-black; }
            .info-table { @apply w-full text-sm md:text-base border-t-4 border-brand-navy border-collapse; }
            .info-table th { @apply bg-slate-50 p-4 border-b border-slate-200 font-bold text-slate-600 text-center; }
            .info-table td { @apply p-4 border-b border-slate-100 text-center font-medium text-slate-700; }
            .logo-box { @apply p-8 border border-slate-100 rounded-[24px] flex flex-col items-center justify-center bg-white shadow-sm hover:shadow-xl transition-all h-[130px] grayscale hover:grayscale-0 overflow-hidden; }
            .level-pill { @apply px-7 py-2.5 rounded-full font-black text-[14px] uppercase tracking-wider transition-all cursor-pointer; }
            .sub-section-title { @apply text-2xl font-black mb-6 italic border-l-[10px] border-brand-blue pl-6 flex items-center gap-3; }
        }
    </style>
</head>
<body>
    <div id="layout" class="flex flex-col min-h-screen">
        <header class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-xl border-b border-slate-100 shadow-sm">
            <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
                <a href="#/" class="flex items-center gap-4 group">
                    <div class="w-12 h-12 bg-brand-blue rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-2xl group-hover:rotate-[15deg] transition duration-500">Y</div>
                    <div class="flex flex-col">
                        <span class="text-xl font-black text-slate-900 leading-none tracking-tighter">동양미래대학교</span>
                        <span class="text-[12px] font-black text-brand-blue tracking-[0.25em] uppercase mt-1">Semiconductor Bootcamp</span>
                    </div>
                </a>
                <nav class="hidden lg:flex items-center space-x-12">
                    <a href="#/about" class="nav-link">사업단 소개</a>
                    <a href="#/courses" class="nav-link">교육과정</a>
                    <a href="#/facilities" class="nav-link">교육 인프라</a>
                    <a href="#/community" class="nav-link">커뮤니티</a>
                    <a href="#/careers" class="nav-link">취업지원</a>
                    <a href="#" class="btn-primary">수강신청</a>
                </nav>
            </div>
        </header>

        <main id="app" class="flex-grow pt-[88px]"></main>

        <footer class="bg-brand-navy text-slate-500 py-24 px-8 border-t border-slate-800">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between gap-16">
                <div class="space-y-8">
                    <h3 class="font-black text-white text-3xl italic tracking-tighter uppercase italic">Dongyang Mirae Semiconductor</h3>
                    <p class="text-base font-medium leading-relaxed opacity-50 italic">08221 서울시 구로구 경인로 445 동양미래대학교 4호관 2층 203호<br/>TEL : 02-2610-1700 | FAX : 02-2688-5494</p>
                </div>
                <div class="flex flex-col items-center md:items-end justify-end space-y-6">
                    <div class="flex gap-8 opacity-60 font-black text-sm uppercase tracking-widest hover:text-white transition cursor-pointer">개인정보처리방침</div>
                    <p class="text-[12px] font-black tracking-[0.35em] opacity-40 uppercase italic">© 2026 Dongyang Mirae Univ. All Rights Reserved.</p>
                </div>
            </div>
        </footer>
    </div>

    <!-- APP ENGINE -->
    <script>
        const handleImgError = (el, name) => {
            el.style.display = 'none';
            const parent = el.parentElement;
            if (parent && parent.classList.contains('logo-box')) {
                const span = document.createElement('span');
                span.className = 'font-black text-brand-navy text-[11px] uppercase tracking-tighter text-center leading-tight';
                span.innerText = name || '협력사';
                parent.appendChild(span);
            } else {
                const div = document.createElement('div');
                div.className = 'w-full h-full bg-slate-50 flex items-center justify-center font-black text-slate-200 italic uppercase text-xs p-10 text-center';
                div.innerText = '이미지 준비 중';
                parent.appendChild(div);
            }
        };

        window.state = {
            aboutTab: 'intro', commTab: 'notice', courseTab: 'degree', facilityTab: 'env',
            degreeLevel: 'beginner', // beginner, intermediate, advanced
            posts: {
                notice: [
                    { id: 3, title: '[공고] 2026년 반도체 부트캠프 수강생 모집 안내', date: '2026-06-18', views: 520, author: '사업단' },
                    { id: 2, title: '교육 장학생 선발 및 지원금 지급 제도 안내', date: '2026-06-10', views: 890, author: '관리자' },
                    { id: 1, title: '부트캠프 수료증 발급 및 학점 인정 절차 안내', date: '2026-05-25', views: 1100, author: '관리자' }
                ],
                data: [
                    { id: 3, title: '반도체 공정 장비 기초 가이드북 (2026)', date: '2026-06-15', views: 156, author: '교수진' },
                    { id: 2, title: '회로 설계 및 레이아웃 실습 예제집', date: '2026-06-02', views: 92, author: '기술팀' },
                    { id: 1, title: '현장 실무형 기술 교육 포트폴리오 양식', date: '2026-05-18', views: 420, author: '지원팀' }
                ],
                gallery: [
                    { title: '반도체 클린룸 현장 실무 실습', img: 'https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?auto=format&fit=crop&w=1200&q=80' },
                    { title: '제2회 마이크로디그리 인증 수여식', img: 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&w=1200&q=80' },
                    { title: '주요 협약기업 인사 초청 특강', img: 'https://images.unsplash.com/photo-1591115765373-5207764f72e7?auto=format&fit=crop&w=1200&q=80' }
                ],
                review: [
                    { id: 3, title: '비전공자에서 반도체 정규직 합격하기까지', date: '2026-06-16', views: 450, author: '이*훈' },
                    { id: 2, title: '부트캠프 집중 교육이 취업에 미친 영향', date: '2026-06-05', views: 280, author: '한*지' },
                    { id: 1, title: '현직 선배가 말하는 현장 역량 강화 팁', date: '2026-05-20', views: 890, author: '최*민' }
                ],
                faq: [
                    { id: 3, title: '교육비는 정말로 전액 무료인가요?', date: '2026-06-18', views: 120, author: '사업단' },
                    { id: 2, title: '학점 인정은 어떻게 진행되나요?', date: '2026-06-12', views: 340, author: '사업단' },
                    { id: 1, title: '취업 지원 프로그램 신청 방법이 궁금합니다.', date: '2026-05-30', views: 210, author: '사업단' }
                ]
            }
        };

        // 게시판 기본(seed) 데이터를 보존해 두고, 신규 글은 그 앞에 표시한다.
        window.SEED_POSTS = JSON.parse(JSON.stringify(window.state.posts));

        const setTab = (k, v) => { window.state[k] = v; router(); };

        // ===== 게시글 작성 모달 =====
        function openPostModal(board) {
            window.__pmBoard = board;
            const fs = window.PostStore && window.PostStore.mode === 'firestore';
            const note = fs ? 'Firebase Firestore에 저장되어 모든 사용자와 공유됩니다.' : '현재 브라우저에 임시 저장됩니다. Firebase 설정을 입력하면 전체 공유됩니다.';
            document.getElementById('modal-root').innerHTML = `
                <div class="fixed inset-0 z-[100] flex items-center justify-center p-6" onclick="if(event.target===this)closePostModal()">
                    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closePostModal()"></div>
                    <div class="relative bg-white w-full max-w-2xl rounded-[32px] shadow-2xl p-10">
                        <div class="flex items-center justify-between mb-8">
                            <h3 class="text-2xl font-black italic tracking-tighter">게시글 작성</h3>
                            <button onclick="closePostModal()" class="w-11 h-11 rounded-full bg-slate-100 text-slate-500 font-black text-lg hover:bg-slate-200 transition">✕</button>
                        </div>
                        <div class="space-y-5">
                            <input id="pm-title" type="text" placeholder="제목을 입력하세요" class="w-full px-5 py-4 rounded-2xl border border-slate-200 text-base font-bold text-slate-800 focus:border-brand-blue focus:outline-none">
                            <input id="pm-author" type="text" placeholder="작성자 (선택, 미입력 시 익명)" class="w-full px-5 py-4 rounded-2xl border border-slate-200 text-base font-bold text-slate-800 focus:border-brand-blue focus:outline-none">
                            <textarea id="pm-content" rows="6" placeholder="내용을 입력하세요" class="w-full px-5 py-4 rounded-2xl border border-slate-200 text-base font-medium text-slate-800 focus:border-brand-blue focus:outline-none resize-none"></textarea>
                        </div>
                        <div class="flex gap-3 mt-8">
                            <button onclick="closePostModal()" class="flex-1 py-4 rounded-full border-2 border-slate-200 font-black text-slate-500 hover:bg-slate-50 transition">취소</button>
                            <button id="pm-submit" onclick="submitPost()" class="flex-1 btn-primary rounded-full">등록하기</button>
                        </div>
                        <p class="text-sm text-slate-400 mt-5 text-center font-medium">${note}</p>
                    </div>
                </div>`;
            document.body.style.overflow = 'hidden';
            setTimeout(() => { const el = document.getElementById('pm-title'); if (el) el.focus(); }, 50);
        }

        function closePostModal() {
            document.getElementById('modal-root').innerHTML = '';
            document.body.style.overflow = '';
        }

        async function submitPost() {
            const board = window.__pmBoard;
            const title = (document.getElementById('pm-title').value || '').trim();
            const author = (document.getElementById('pm-author').value || '').trim() || '익명';
            const content = (document.getElementById('pm-content').value || '').trim();
            if (!title) { alert('제목을 입력해 주세요.'); return; }
            const btn = document.getElementById('pm-submit');
            const old = btn.innerText; btn.disabled = true; btn.innerText = '저장 중...';
            try {
                if (!window.PostStore) throw new Error('저장소가 준비되지 않았습니다.');
                await window.PostStore.add(board, { title, author, content });
                closePostModal();
                router();
            } catch (e) {
                alert('저장 중 오류가 발생했습니다: ' + e.message);
                btn.disabled = false; btn.innerText = old;
            }
        }

        // ===== 게시글 보기 모달 =====
        function openPostView(board, id) {
            const item = (window.state.posts[board] || []).find(x => String(x.id) === String(id));
            if (!item) return;
            const body = (item.content && item.content.trim()) ? item.content.replace(/</g, '&lt;').replace(/\n/g, '<br>') : '등록된 본문 내용이 없습니다.';
            document.getElementById('modal-root').innerHTML = `
                <div class="fixed inset-0 z-[100] flex items-center justify-center p-6" onclick="if(event.target===this)closePostModal()">
                    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closePostModal()"></div>
                    <div class="relative bg-white w-full max-w-2xl rounded-[32px] shadow-2xl p-10 max-h-[85vh] overflow-y-auto">
                        <div class="flex items-start justify-between mb-6 gap-4">
                            <h3 class="text-2xl font-black italic tracking-tighter leading-snug">${item.title}</h3>
                            <button onclick="closePostModal()" class="shrink-0 w-11 h-11 rounded-full bg-slate-100 text-slate-500 font-black text-lg hover:bg-slate-200 transition">✕</button>
                        </div>
                        <div class="flex gap-6 text-sm font-bold text-slate-400 border-b border-slate-100 pb-6 mb-8">
                            <span>작성자 ${item.author || '익명'}</span><span>등록일 ${item.date || '-'}</span><span>조회 ${item.views || 0}</span>
                        </div>
                        <p class="text-lg font-medium text-slate-600 leading-loose">${body}</p>
                    </div>
                </div>`;
            document.body.style.overflow = 'hidden';
        }

        const renderBanner = (title, sub) => `
            <section class="relative h-[250px] bg-brand-blue overflow-hidden flex items-center justify-center text-center">
                <div class="absolute inset-0 bg-[radial-gradient(#ffffff1a_1.5px,transparent_1.5px)] [background-size:24px_24px] opacity-20"></div>
                <div class="relative z-10 px-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <h1 class="text-4xl md:text-5xl font-black text-white italic tracking-tighter mb-4 uppercase italic">${title}</h1>
                    <p class="text-blue-100 text-lg font-medium opacity-80 italic tracking-widest">${sub}</p>
                </div>
            </section>
        `;

        function renderAbout() {
            const tabs = [ { id: 'greeting', name: '인사말' }, { id: 'intro', name: '사업소개' }, { id: 'org', name: '조직도' }, { id: 'agencies', name: '협력기관' }, { id: 'depts', name: '참여학과' }, { id: 'map', name: '오시는 길' } ];
            const t = window.state.aboutTab;
            let content = '';

            if (t === 'intro') {
                content = `
                    <div class="max-w-6xl mx-auto py-24 space-y-32 animate-in fade-in">
                        <div>
                            <h3 class="text-3xl font-black mb-16 italic border-l-[12px] border-brand-blue pl-6">사업 개요</h3>
                            <table class="info-table">
                                <tr><th class="w-1/3">사업명</th><td class="text-left font-black text-lg">첨단산업인재양성 부트캠프사업 (반도체분야)</td></tr>
                                <tr><th>사업목적</th><td class="text-left py-10 font-bold leading-relaxed text-slate-500">기업 수요에 맞춘 단기 집중 커리큘럼을 통해 현장 실효성이 높은 반도체 분야 기술 및 장비 운용 전문가 교 육</td></tr>
                                <tr><th>사업기간</th><td class="text-left">2023. 03. 01 ~ 2028. 02. 29 (5년)</td></tr>
                                <tr><th>주관부처</th><td class="text-left font-bold text-brand-blue">교육부 | 한국산업기술진흥원 (KIAT)</td></tr>
                            </table>
                        </div>
                        <div class="text-center">
                             <h3 class="text-3xl font-black mb-20 italic text-left border-l-[12px] border-brand-blue pl-6">비전 및 목표</h3>
                             <div class="flex flex-col lg:flex-row items-center justify-center gap-6">
                                <div class="flex-1 min-h-[350px] bg-brand-blue text-white p-16 rounded-[60px] flex flex-col justify-center shadow-2xl relative overflow-hidden group">
                                    <span class="text-4xl font-black italic mb-6 block opacity-40 uppercase tracking-widest">Vision</span>
                                    <p class="text-3xl font-black uppercase tracking-tighter italic italic">최고의 반도체<br>교육 혁신 플랫폼</p>
                                </div>
                                <div class="w-64 h-64 min-w-[256px] bg-white flex items-center justify-center z-10 -mx-10 sm:rounded-full border-[12px] border-brand-blue font-black text-brand-blue text-center text-3xl shadow-3xl">사업단</div>
                                <div class="flex-1 min-h-[350px] bg-brand-yellow text-slate-900 p-16 rounded-[60px] flex flex-col justify-center shadow-2xl relative overflow-hidden group">
                                    <span class="text-4xl font-black italic mb-6 block opacity-20 uppercase tracking-widest">Goal</span>
                                    <p class="text-3xl font-black uppercase tracking-tighter italic italic">국가 전략 사업<br>전문 인력 배출</p>
                                </div>
                             </div>
                        </div>
                    </div>`;
            } else if (t === 'agencies') {
                const list = [{n:'동양미래대학교',l:'https://www.dongyang.ac.kr/sites/dmu/images/common/logo.png'},{n:'교육부',l:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Ministry_of_Education_%28South_Korea%29_logo.svg/512px-Ministry_of_Education_%28South_Korea%29_logo.svg.png'},{n:'KIAT',l:'https://www.kiat.or.kr/content/images/common/logo.png'},{n:'산업단지공단',l:''},{n:'ETRI',l:'https://www.etri.re.kr/assets/images/common/logo.png'}];
                content = `<div class="max-w-6xl mx-auto py-24 animate-in fade-in"><h3 class="text-3xl font-black mb-16 italic border-l-8 border-brand-blue pl-4">주요 거버넌스 및 협력 기관</h3><div class="grid grid-cols-2 md:grid-cols-5 gap-8">${list.map(a => `<div class="logo-box">${a.l ? `<img src="${a.l}" class="max-h-14 w-auto object-contain" onerror="handleImgError(this, '${a.n}')">` : `<span class="font-black text-brand-navy text-[10px] uppercase tracking-tighter text-center">${a.n}</span>`}</div>`).join('')}</div></div>`;
            } else if (t === 'greeting') {
                content = `<div class="max-w-4xl mx-auto py-24 animate-in fade-in"><div class="glass-card shadow-2xl p-16"><div class="h-[550px] mb-12 rounded-[40px] overflow-hidden bg-slate-50 shadow-inner"><img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1600&q=80" class="w-full h-full object-cover" onerror="handleImgError(this)"></div><h3 class="text-3xl font-black mb-8 italic tracking-tighter leading-tight italic">"미래를 설계하는 반도체 전문가,<br>우리가 함께 만들어갑니다."</h3><p class="text-xl font-bold text-slate-400 leading-relaxed italic opacity-80 mb-16 italic">반도체 산업의 핵심 인력을 양성하기 위해 최고의 설비와 현장형 교수진이 혁신적인 교육을 제공하겠습니다.</p><div class="text-right border-t border-slate-100 pt-12"><span class="text-3xl font-black italic uppercase tracking-tighter">사업단장 오석중</span></div></div></div>`;
            } else if (t === 'org') {

    <!-- 게시글 모달이 그려지는 영역 -->
    <div id="modal-root"></div>

    <!-- ===== Firebase 연동 (게시글 작성/조회) ===== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ┌──────────────────────────────────────────────────────────────┐
        // │  여기에 본인 Firebase 프로젝트 설정(firebaseConfig)을 붙여넣으세요.   │
        // │  Firebase 콘솔 > 프로젝트 설정 > 일반 > 내 앱 > SDK 설정 및 구성     │
        // └──────────────────────────────────────────────────────────────┘
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const BOARDS = ['notice', 'data', 'review', 'faq'];
        const isConfigured = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('YOUR_');

        let db = null;
        if (isConfigured) {
            try { db = getFirestore(initializeApp(firebaseConfig)); }
            catch (e) { console.error('Firebase 초기화 실패:', e); }
        }

        const fmtDate = (ts) => {
            try { const d = ts && ts.toDate ? ts.toDate() : new Date(); return d.toISOString().slice(0, 10); }
            catch (_) { return new Date().toISOString().slice(0, 10); }
        };

        // 신규 글(live) + 기본(seed) 데이터를 합쳐 화면 상태에 반영하고 필요 시 재렌더링
        const applyLive = (board, liveList) => {
            const seed = (window.SEED_POSTS && window.SEED_POSTS[board]) || [];
            window.state.posts[board] = liveList.concat(seed);
            const hash = (window.location.hash.slice(1) || '/');
            if (hash.startsWith('/community') && typeof window.router === 'function') window.router();
        };

        const PostStore = {
            mode: db ? 'firestore' : 'local',
            add: async (board, post) => {
                if (db) {
                    await addDoc(collection(db, 'posts'), {
                        board, title: post.title, author: post.author, content: post.content || '',
                        views: 0, createdAt: serverTimestamp()
                    });
                } else {
                    const key = 'posts_' + board;
                    const arr = JSON.parse(localStorage.getItem(key) || '[]');
                    arr.unshift({
                        id: 'local-' + Date.now(), title: post.title, author: post.author,
                        content: post.content || '', views: 0, date: new Date().toISOString().slice(0, 10)
                    });
                    localStorage.setItem(key, JSON.stringify(arr));
                    applyLive(board, arr);
                }
            }
        };
        window.PostStore = PostStore;

        if (db) {
            // Firestore 실시간 구독 (작성 즉시 모든 사용자 화면에 반영)
            BOARDS.forEach(board => {
                const q = query(collection(db, 'posts'), where('board', '==', board), orderBy('createdAt', 'desc'));
                onSnapshot(q, snap => {
                    const list = snap.docs.map(doc => {
                        const x = doc.data();
                        return { id: doc.id, title: x.title, author: x.author || '익명', views: x.views || 0, date: fmtDate(x.createdAt), content: x.content || '' };
                    });
                    applyLive(board, list);
                }, err => console.error('Firestore 구독 오류:', err));
            });
        } else {
            // 설정 전: localStorage에 저장된 글을 초기 표시
            BOARDS.forEach(board => {
                const arr = JSON.parse(localStorage.getItem('posts_' + board) || '[]');
                if (arr.length) applyLive(board, arr);
            });
        }
    </script>
