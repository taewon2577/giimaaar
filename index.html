<!DOCTYPE html>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-white text-slate-900 font-sans antialiased; margin: 0; }
        }
        @layer components {
            .glass-card { @apply bg-white border border-slate-200 rounded-2xl shadow-sm transition-all overflow-hidden p-8; }

        .page-banner {
            background: linear-gradient(135deg, #001a33 0%, #0066cc 100%);
            position: relative;
            overflow: hidden;
        }
        .circuit-bg {
            position: absolute; inset: 0; opacity: 0.1;
            background-image: radial-gradient(#fff 1px, transparent 1px);

</head>
<body>

        <!-- HEADER -->
        <header id="header" class="fixed top-0 w-full z-50 bg-white border-b border-slate-100">

                <a href="#/" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-brand-blue rounded flex items-center justify-center text-white font-black">Y</div>
                    <span class="text-xl font-black text-slate-800 tracking-tight italic uppercase">DMU <span class="text-brand-blue">Bootcamp</span></span>
                </a>
                <nav class="hidden md:flex items-center space-x-10">

                <div><h3 class="font-black text-brand-blue mb-4 uppercase italic">Dongyang Mirae University</h3><p class="text-xs text-slate-400 leading-relaxed font-bold">08221 서울시 구로구 경인로 445 동양미래대학교 4호관 2층 203호<br/>TEL : 02-2610-1700 | FAX : 02-2688-5494</p></div>
                <div class="text-[10px] text-slate-300 font-black tracking-widest uppercase">© 2026 DONGYANG MIRAE UNIVERSITY.</div>

    <!-- SCRIPTS -->
    <script>
        window.state = {
            aboutTab: 'greeting', commTab: 'notice', courseTab: 'degree', facilityTab: 'env',
            posts: {
                notice: [ { id: 3, type: 'NOTICE', title: '[램리서치코리아] 2026 하반기 FSE 공채 및 On-site 이벤트 안내', author: '관리자', date: '2026-06-16', views: 42, file: true }, { id: 2, type: 'NOTICE', title: '몰입형 조기 마감 안내', author: '관리자', date: '2026-06-02', views: 156 }, { id: 1, type: 'NOTICE', title: '2026년 하계 몰입형 교육 신청 안내', author: '관리자', date: '2026-05-19', views: 1024, file: true } ],
                data: [ { id:3, type:'DATA', title:'반도체 공정 교육 교안 (PDF)', author:'관리자', date:'2026-06-10', views:88, file:true }],

                faq: [ { id: 1, type: 'FAQ', title: '[비용] 교육비는 전액 무료인가요?', author:'관리자', date:'2026-05-08', views:1200 } ],
                gallery: [ { id:1, title:'3호관 클린룸 실습 현장', img:'./assets/gallery1.png', date:'2026-05-10' } ]

            isWriting: false

        const routes = {
            '/': renderHome, '/about': renderAbout, '/courses': renderCourses, '/schedule': renderFacility, '/community': renderCommunity, '/careers': () => renderBannerPage('채용정보', '글로벌 초일류 기업과의 채용 연계를 지원합니다.')
        };

        function router() {
            const path = window.location.hash.slice(1) || '/';
            const app = document.getElementById('app');
            app.innerHTML = (routes[path] || renderHome)();
            window.scrollTo(0, 0);
            document.querySelectorAll('.nav-link').forEach(link => link.classList.toggle('nav-active', link.getAttribute('href').slice(1) === path));
        }
        window.addEventListener('hashchange', router);
        window.addEventListener('load', router);

        const setTab = (key, id) => { window.state[key] = id; if(key === 'commTab') window.state.isWriting = false; router(); };
        const toggleWrite = (val) => { window.state.isWriting = val; router(); };

        function renderBanner(title, subtitle) {
            return `<section class="page-banner py-20 text-center text-white"><div class="circuit-bg"></div><div class="relative z-10 px-6"><div class="text-[10px] font-black opacity-30 mb-2 tracking-[0.45em] uppercase">Semiconductor Bootcamp</div><h1 class="text-4xl md:text-5xl font-black mb-4 italic tracking-tighter">${title}</h1><p class="text-slate-100 font-medium text-sm md:text-base">${subtitle}</p></div></section>`;
        }

        function renderHome() {
            return `<div class="animate-in fade-in duration-1000"><section class="bg-white min-h-[75vh] flex flex-col justify-center items-center text-center px-6 relative"><div class="absolute inset-0 opacity-[0.03] bg-[radial-gradient(#0066cc_1px,transparent_1px)] [background-size:24px_24px]"></div><div class="relative z-10"><h2 class="text-6xl md:text-8xl font-black mb-8 italic uppercase tracking-tighter leading-none italic uppercase">Future in <span class="text-brand-blue italic">Chips</span></h2><p class="text-slate-400 text-xl font-bold mb-12 italic uppercase tracking-widest">Global Lab. Local Impact. Tomorrow's Power.</p><div class="flex gap-4 justify-center"><a href="#/courses" class="btn-primary rounded-full px-12 py-4">Explore Curriculum</a><a href="#/about" class="px-12 py-4 border border-slate-200 rounded-full font-black text-slate-400 hover:bg-slate-100 transition">About Us</a></div></div></section></div>`;
        }

        }

                                <h4 class="text-2xl font-black border-l-4 border-brand-blue pl-4">초급 과정</h4>
                                <div class="space-y-6">
                                    <div class="glass-card">
                                        <h5 class="text-xl font-bold mb-4">1. 반도체공정 및 설비기초</h5>
                                        <p class="text-sm text-slate-500 mb-6">물리적 특성 이해 및 소자 학습, 공정 및 설비 이해</p>
                                        <table class="info-table">
                                            <thead><tr><th>수준</th><th>유형</th><th>교과목</th><th>학년/학기</th><th>시간</th><th>학점</th><th>이수기준</th></tr></thead>

                                        </table>
                                    </div>
                                    <div class="glass-card">
                                        <h5 class="text-xl font-bold mb-4">2. 반도체소자 및 공정기초</h5>
                                        <p class="text-sm text-slate-500 mb-6">기초 소자(Diode, Transistor) 기반 동작 방식 및 제작 흐름 학습</p>
                                        <table class="info-table">
                                            <thead><tr><th>수준</th><th>유형</th><th>교과목</th><th>학년/학기</th><th>시간</th><th>학점</th><th>이수기준</th></tr></thead>
                                            <tbody><tr><td>초급</td><td>교과형</td><td>반도체공학</td><td>1/2</td><td>30</td><td>2</td><td>C학점 이상</td></tr></tbody>
                                        </table>
                                    </div>
                                </div>

                                                <tr><td>교과형</td><td>PLC제어 / PC기반제어</td><td>2/2</td><td>45</td><td>3</td></tr>
                                                <tr><td>몰입형</td><td>협동로봇오퍼레이션 실무</td><td>2,3학</td><td>45</td><td>3</td></tr>
                                            </tbody>

                                </div>
                            </div>

                        <div class="space-y-16">

                                <tbody>
                                    <tr class="bg-blue-50/30 font-bold"><td colspan="8">초급</td></tr>
                                    <tr><td>초급</td><td>반도체장비유지보수 실무</td><td>(주)이엑스솔루션</td><td>30</td><td>2</td><td>F/P</td><td>반도체설비보전 기능사</td><td>한국산업인력공단</td></tr>
                                    <tr class="bg-blue-50/30 font-bold"><td colspan="8">중급</td></tr>

                            </div>
                            <div class="glass-card">
                                <h4 class="text-xl font-bold mb-6 text-brand-navy">취업 지원</h4>
                                <table class="info-table text-left">
                                    <thead><tr><th>프로그램</th><th>내용</th></tr></thead>
                                    <tbody>
                                        <tr><td class="font-bold">취업컨설팅</td><td>모의면접, 이력서 작성, 스피치 코칭 지원</td></tr>
                                        <tr><td class="font-bold">취업설명회</td><td>채용 담당자 초청 설명회 및 네트워킹</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="animate-in fade-in">
                    ${renderBanner('교육과정안내', '마이크로디그리 정규 교과부터 현장 몰입 실무까지 탄탄한 커리큘럼.')}
                    <div class="max-w-7xl mx-auto px-6 py-10">
                        <div class="flex mb-16">${tabs.map(t => `<button onclick="setTab('courseTab', '${t.id}')" class="tab-btn ${window.state.courseTab === t.id ? 'tab-active' : ''}">${t.name}</button>`).join('')}</div>
                        <div>${content}</div>
                    </div>
                </div>
            `;
        }

        // --- OTHER PAGES ---
        function renderFacility() {
            return `<div>${renderBanner('교육시설장비', '최첨단 교육 인프라를 소개합니다.')}<div class="max-w-7xl mx-auto px-6 py-24 animate-in fade-in"><div class="grid grid-cols-1 md:grid-cols-2 gap-10"><div class="glass-card group"><div class="h-80 overflow-hidden"><img src="./assets/cleanroom.png" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000"></div><div class="pt-8"><h4 class="text-2xl font-black mb-4">반도체클린룸</h4><p class="text-slate-500">3호관 109호 소재. 100클래스 환경의 정밀 공정 교육장.</p></div></div><div class="glass-card group"><div class="h-80 overflow-hidden"><img src="./assets/robot_center.png" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000"></div><div class="pt-8"><h4 class="text-2xl font-black mb-4">첨단반도체 로봇기술센터</h4><p class="text-slate-500">4호관 102호 소재. 협동로봇 및 자동화 제어 실습실.</p></div></div></div></div></div>`;
        }

        function renderCommunity() {
            const tabs = [{ id:'notice', name:'공지사항' }, { id:'data', name:'자료실' }, { id:'gallery', name:'갤러리' }, { id:'review', name:'취업후기' }, { id:'faq', name:'FAQ' }];
            let content = '';
            if (window.state.isWriting) { content = `<div class="max-w-4xl mx-auto py-20"><div class="space-y-6"><input type="text" placeholder="Title" class="w-full p-4 border rounded-xl outline-none focus:ring-4 focus:ring-blue-50"><textarea class="w-full p-4 border rounded-xl min-h-[300px] outline-none"></textarea><div class="flex justify-end gap-2"><button onclick="toggleWrite(false)" class="px-6 py-2 bg-slate-100 rounded font-bold">Cancel</button><button onclick="alert('Done')" class="px-8 py-2 bg-brand-blue text-white rounded font-bold">Post</button></div></div></div>`; }
            else if (window.state.commTab === 'gallery') { content = `<div class="max-w-6xl mx-auto py-20 grid grid-cols-1 md:grid-cols-3 gap-8">${window.state.posts.gallery.map(g => `<div class="glass-card p-0 group"><div class="h-60 overflow-hidden"><img src="${g.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000"></div><div class="p-6"><h4 class="font-bold truncate">${g.title}</h4></div></div>`).join('')}</div>`; }
            else { 
                const current = window.state.posts[window.state.commTab] || [];
                content = `<div class="max-w-6xl mx-auto py-20"><table class="info-table"><thead><tr><th>No</th><th>Title</th><th>Views</th><th>Date</th></tr></thead><tbody>${current.map(p => `<tr><td>${p.id}</td><td class="text-left font-bold px-6">${p.title}</td><td>${p.views}</td><td>${p.date}</td></tr>`).join('')}</tbody></table><div class="mt-8 flex justify-end"><button onclick="toggleWrite(true)" class="btn-primary rounded-full">Write</button></div></div>`;
            }
            return `<div>${renderBanner('커뮤니티', '교육생들과 함께 나누는 공간.')}<div class="max-w-7xl mx-auto px-6"><div class="flex border-b">${tabs.map(t => `<button onclick="setTab('commTab', '${t.id}')" class="tab-btn ${window.state.commTab === t.id ? 'tab-active' : ''}">${t.name}</button>`).join('')}</div><div>${content}</div></div></div>`;
        }

        function renderBannerPage(title, sub) { return `<div>${renderBanner(title, sub)}<div class="py-32 text-center text-slate-200 font-black italic">Content Coming Soon</div></div>`; }

        // --- INIT ---
        window.onload = router;
    </script>
</body>
</html>
